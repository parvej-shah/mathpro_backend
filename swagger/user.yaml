/user/contest/leave/{contestId}:
  post:
    tags:
      - User Contest
    summary: Unregister (leave) a contest
    description: Allows a user to unregister (remove themselves) from a contest they previously joined
    security:
      - bearerAuth: []
    parameters:
      - in: path
        name: contestId
        required: true
        schema:
          type: integer
        description: ID of the contest to unregister from
    responses:
      "200":
        description: Successfully unregistered from the contest
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                message:
                  type: string
                  example: Successfully left the contest
      "400":
        description: Bad request
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: false
                error:
                  type: string
                  example: You are not enrolled in this course
      "401":
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Error"
      "500":
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Error"

/user/contest/participants/{contestId}:
  get:
    tags:
      - User Contest
    summary: Get contest participants
    description: Retrieves the list of participants for a specific contest
    security:
      - bearerAuth: []
    parameters:
      - in: path
        name: contestId
        required: true
        schema:
          type: integer
        description: ID of the contest
    responses:
      "200":
        description: Successfully retrieved participants
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                data:
                  type: array
                  items:
                    type: object
                    properties:
                      user_id:
                        type: integer
                        example: 1
                      user_name:
                        type: string
                        example: John Doe
                      email:
                        type: string
                        example: john@example.com
                      phone:
                        type: string
                        example: "+1234567890"
                      photo:
                        type: string
                        example: "https://example.com/photo.jpg"
                      score:
                        type: number
                        example: 85.5
                      joining_date:
                        type: string
                        format: date-time
                        example: "2024-03-20T10:00:00Z"
                      is_current_user:
                        type: boolean
                        example: true
      "400":
        description: Bad request
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: false
                error:
                  type: string
                  example: You are not enrolled in this course
      "401":
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Error"
      "500":
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Error"

